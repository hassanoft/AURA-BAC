name: Build AURA APK

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.2'
          channel: 'stable'
          cache: true

      - name: 📦 Get Flutter dependencies
        run: flutter pub get

      - name: 🏗️ Build APK (Debug)
        run: flutter build apk --debug --split-per-abi

      - name: 🏗️ Build APK (Release)
        run: flutter build apk --release --split-per-abi
        if: startsWith(github.ref, 'refs/tags/')

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: aura-debug-apk
          path: build/app/outputs/flutter-apk/*debug*.apk
          retention-days: 7

      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/*release*.apk
          name: AURA BAC ${{ github.ref_name }}
          body: |
            ## 🎓 AURA BAC - ${{ github.ref_name }}

            **Réussis ton BAC avec confiance.**

            ### 📱 Téléchargement
            Choisissez la version correspondant à votre appareil :
            - `arm64-v8a` → Appareils modernes (64-bit) ✅ Recommandé
            - `armeabi-v7a` → Appareils anciens (32-bit)
            - `x86_64` → Émulateurs

            ### 📋 Installation
            1. Téléchargez l'APK correspondant à votre appareil
            2. Activez "Sources inconnues" dans les paramètres
            3. Installez et lancez AURA

          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}